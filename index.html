<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Dark Mode -->
      <button id="darkModeToggle">🌙 Toggle Dark Mode</button>

      <h2>Password Generator</h2>

      <!-- Output -->
      <div class="output">
        <input type="text" id="password" readonly />
        <button id="copyBtn">Copy</button>
      </div>

      <!-- Strength -->
      <div class="strength">Strength: <span id="strengthText">Weak</span></div>
      <div class="strength-bar">
        <div id="strengthBar"></div>
      </div>

      <!-- Length -->
      <div class="settings">
        <label> Length: <span id="lengthValue">8</span> </label>
        <input type="range" id="length" min="4" max="20" value="8" />
      </div>

      <!-- Options -->
      <div class="settings">
        <label><input type="checkbox" id="uppercase" /> Uppercase (A-Z)</label>
        <label><input type="checkbox" id="lowercase" /> Lowercase (a-z)</label>
        <label><input type="checkbox" id="numbers" /> Numbers (0-9)</label>
        <label><input type="checkbox" id="symbols" /> Symbols (!@#$)</label>
      </div>

      <!-- Generate -->
      <button class="generate" id="generateBtn">Generate Password</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
